<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#2c2c2e" />
            <stop offset="100%" stop-color="#1c1c1e" />
        </linearGradient>
        <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FF9F0A" />
            <stop offset="100%" stop-color="#FF375F" />
        </linearGradient>
        <linearGradient id="grayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#4a4a4c" />
            <stop offset="100%" stop-color="#3a3a3c" />
        </linearGradient>
        <linearGradient id="lightGrayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#a1a1a6" />
            <stop offset="100%" stop-color="#8e8e93" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.25" />
        </filter>
    </defs>

    <!-- Base squircle -->
    <rect width="512" height="512" rx="115" fill="url(#bgGrad)" filter="url(#shadow)" />

    <!-- Inner Border for 3D effect -->
    <rect x="2" y="2" width="508" height="508" rx="113" fill="none" stroke="#4a4a4c" stroke-width="2" opacity="0.5" />

    <!-- Display -->
    <rect x="40" y="36" width="432" height="96" rx="24" fill="#121212" />
    <rect x="40" y="36" width="432" height="96" rx="24" fill="none" stroke="#000000" stroke-width="4" opacity="0.5" />
    <text x="440" y="108" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="64" font-weight="200" fill="#ffffff" text-anchor="end">42</text>

    <!-- Button Groups -->
    <g font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="400" fill="#ffffff" text-anchor="middle">
        <!-- Row 1 -->
        <rect x="40" y="160" width="90" height="52" rx="26" fill="url(#lightGrayGrad)" />
        <text x="85" y="196" fill="#1c1c1e" font-weight="500">AC</text>

        <rect x="154" y="160" width="90" height="52" rx="26" fill="url(#lightGrayGrad)" />
        <text x="199" y="196" fill="#1c1c1e" font-weight="500">+/-</text>

        <rect x="268" y="160" width="90" height="52" rx="26" fill="url(#lightGrayGrad)" />
        <text x="313" y="196" fill="#1c1c1e" font-weight="500">%</text>

        <rect x="382" y="160" width="90" height="52" rx="26" fill="url(#orangeGrad)" />
        <text x="427" y="196" font-size="28" font-weight="500">÷</text>

        <!-- Row 2 -->
        <rect x="40" y="228" width="90" height="52" rx="26" fill="url(#grayGrad)" />
        <text x="85" y="264" font-size="26">7</text>

        <rect x="154" y="228" width="90" height="52" rx="26" fill="url(#grayGrad)" />
        <text x="199" y="264" font-size="26">8</text>

        <rect x="268" y="228" width="90" height="52" rx="26" fill="url(#grayGrad)" />
        <text x="313" y="264" font-size="26">9</text>

        <rect x="382" y="228" width="90" height="52" rx="26" fill="url(#orangeGrad)" />
        <text x="427" y="264" font-size="28" font-weight="500">×</text>

        <!-- Row 3 -->
        <rect x="40" y="296" width="90" height="52" rx="26" fill="url(#grayGrad)" />
        <text x="85" y="332" font-size="26">4</text>

        <rect x="154" y="296" width="90" height="52" rx="26" fill="url(#grayGrad)" />
        <text x="199" y="332" font-size="26">5</text>

        <rect x="268" y="296" width="90" height="52" rx="26" fill="url(#grayGrad)" />
        <text x="313" y="332" font-size="26">6</text>

        <rect x="382" y="296" width="90" height="52" rx="26" fill="url(#orangeGrad)" />
        <text x="427" y="332" font-size="28" font-weight="500">−</text>

        <!-- Row 4 -->
        <rect x="40" y="364" width="90" height="52" rx="26" fill="url(#grayGrad)" />
        <text x="85" y="400" font-size="26">1</text>

        <rect x="154" y="364" width="90" height="52" rx="26" fill="url(#grayGrad)" />
        <text x="199" y="400" font-size="26">2</text>

        <rect x="268" y="364" width="90" height="52" rx="26" fill="url(#grayGrad)" />
        <text x="313" y="400" font-size="26">3</text>

        <rect x="382" y="364" width="90" height="52" rx="26" fill="url(#orangeGrad)" />
        <text x="427" y="400" font-size="28" font-weight="500">+</text>

        <!-- Row 5 -->
        <rect x="40" y="432" width="204" height="52" rx="26" fill="url(#grayGrad)" />
        <text x="142" y="468" font-size="26">0</text>

        <rect x="268" y="432" width="90" height="52" rx="26" fill="url(#grayGrad)" />
        <text x="313" y="468" font-size="26">.</text>

        <rect x="382" y="432" width="90" height="52" rx="26" fill="url(#orangeGrad)" />
        <text x="427" y="468" font-size="28" font-weight="500">=</text>
    </g>
</svg>
